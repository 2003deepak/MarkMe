version: "3.9"

services:

  # backend api
  backend:
    build: .
    image: markme_app:latest
    container_name: markme_backend
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - temp_data:/app/temp
      - media_data:/var/app/media
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  # scheduler
  scheduler:
    build: .
    image: markme_app:latest
    container_name: markme_scheduler
    restart: unless-stopped
    command: python app/cron_job/cron.py
    env_file:
      - .env
    volumes:
      - temp_data:/app/temp
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  # workers
  worker_session:
    build: .
    image: markme_app:latest
    container_name: worker_session
    restart: unless-stopped
    command: python app/workers/worker_session.py
    env_file:
      - .env
    volumes:
      - temp_data:/app/temp
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker_email:
    build: .
    image: markme_app:latest
    container_name: worker_email
    restart: unless-stopped
    command: python app/workers/worker_email.py
    env_file:
      - .env
    volumes:
      - temp_data:/app/temp
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker_cleanup:
    build: .
    image: markme_app:latest
    container_name: worker_cleanup
    restart: unless-stopped
    command: python app/workers/worker_cleanup.py
    env_file:
      - .env
    volumes:
      - temp_data:/app/temp
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker_embeddings:
    build: .
    image: markme_app:latest
    container_name: worker_embeddings
    restart: unless-stopped
    command: python app/workers/worker_embeddings.py
    env_file:
      - .env
    volumes:
      - temp_data:/app/temp
      - media_data:/var/app/media
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker_face:
    build: .
    image: markme_app:latest
    container_name: worker_face
    restart: unless-stopped
    command: python app/workers/worker_face_recognition.py
    env_file:
      - .env
    volumes:
      - temp_data:/app/temp
      - media_data:/var/app/media
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker_notifications:
    build: .
    image: markme_app:latest
    container_name: worker_notifications
    restart: unless-stopped
    command: python app/workers/worker_notifications.py
    env_file:
      - .env
    volumes:
      - temp_data:/app/temp
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  worker_attendance:
    build: .
    image: markme_app:latest
    container_name: worker_attendance
    restart: unless-stopped
    command: python app/workers/worker_attendance_stream.py
    env_file:
      - .env
    volumes:
      - temp_data:/app/temp
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # rabbitmq
  rabbitmq:
    build: ./rabbitmq
    container_name: rabbitmq
    restart: unless-stopped
    ports:
      - "5673:5672"
      - "15673:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: strongpassword
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      options:
        max-size: "10m"
        max-file: "3"

  # redis (internal only)
  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --protected-mode yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    env_file:
      - .env

  # mongodb (internal only)
  mongo:
    image: mongo:7
    container_name: mongo
    restart: unless-stopped
    command: >
      mongod
      --replSet rs0
      --auth
      --bind_ip_all
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: >
        mongosh -u admin -p $MONGO_ROOT_PASSWORD --eval "db.adminCommand('ping')"
      interval: 10s
      timeout: 5s
      retries: 5
    env_file:
      - .env

  # mongo replica init (runs once)
  mongo-init:
    image: mongo:7
    depends_on:
      mongo:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      bash -c "
      mongosh -u admin -p $MONGO_ROOT_PASSWORD --host mongo:27017 --eval '
        try {
          rs.initiate({
            _id: \"rs0\",
            members: [{ _id: 0, host: \"mongo:27017\" }]
          })
        } catch(e) { print(e) }
      '
      "
    env_file:
      - .env

volumes:
  rabbitmq_data:
  redis_data:
  mongo_data:
  temp_data:
  media_data: